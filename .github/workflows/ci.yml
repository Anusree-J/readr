name: CI

on:
  push:
    branches: [main]
  pull_request:

# contents: write lets the reader-app job push captured screenshots to the
# `ci-screenshots` branch.
permissions:
  contents: write

jobs:
  reader-kit:
    name: Build & test ReadrKit
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode_15.4.app
      - name: Build
        run: swift build
      - name: Test
        run: swift test

  reader-app:
    name: Build Readr app (iOS + macOS)
    # macOS 15 ships Xcode 16, which reads the project format XcodeGen emits.
    runs-on: macos-15
    env:
      # Simulator names drift across Xcode images; keep them in one place and
      # check `xcrun simctl list devicetypes` when a rename breaks the job.
      IPHONE_SIM: iPhone 16
      IPAD_SIM: iPad Pro 13-inch (M4)
    steps:
      - uses: actions/checkout@v4
      - name: Show Xcode version
        run: xcodebuild -version
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        run: xcodegen generate
      - name: Build (macOS)
        run: >
          set -o pipefail &&
          xcodebuild build
          -project Readr.xcodeproj
          -scheme Readr
          -destination 'generic/platform=macOS'
          -skipPackagePluginValidation
          CODE_SIGNING_ALLOWED=NO
      # Device SDK, not simulator: catches iOS-device-only breakage (missing
      # frameworks, arch issues) on every PR instead of at TestFlight time.
      - name: Build (iOS device SDK)
        run: >
          set -o pipefail &&
          xcodebuild build
          -project Readr.xcodeproj
          -scheme Readr
          -destination 'generic/platform=iOS'
          -skipPackagePluginValidation
          CODE_SIGNING_ALLOWED=NO
      # Offscreen SwiftUI renders of the macOS-only surfaces (m-prefixed
      # PNGs). App-hosted unit tests, not XCUITest — deterministic on runners.
      - name: Snapshot tests (macOS)
        run: >
          set -o pipefail &&
          xcodebuild test
          -project Readr.xcodeproj
          -scheme ReadrSnapshots
          -destination 'platform=macOS'
          -skipPackagePluginValidation
          -resultBundlePath MacResults
          CODE_SIGNING_ALLOWED=NO
      # -retry-tests-on-failure + -test-iterations 3: XCUITest on the
      # simulator is timing-sensitive and occasionally flakes (sheet/inspector
      # presentation races). Retrying a *failed* test up to twice rescues
      # intermittent flakes while a real regression still fails all three
      # attempts and reddens the build.
      - name: UI tests (iPhone Simulator)
        run: >
          set -o pipefail &&
          xcodebuild test
          -project Readr.xcodeproj
          -scheme Readr
          -destination "platform=iOS Simulator,name=${IPHONE_SIM}"
          -skipPackagePluginValidation
          -retry-tests-on-failure
          -test-iterations 3
          -resultBundlePath TestResults
          CODE_SIGNING_ALLOWED=NO
      # Same suite at iPad size: regular-width layouts (side-by-side split
      # view, double-page reader) take different code paths than the iPhone's
      # compact ones, so iPhone-green does not imply iPad-green.
      - name: UI tests (iPad Simulator)
        run: >
          set -o pipefail &&
          xcodebuild test
          -project Readr.xcodeproj
          -scheme Readr
          -destination "platform=iOS Simulator,name=${IPAD_SIM}"
          -skipPackagePluginValidation
          -retry-tests-on-failure
          -test-iterations 3
          -resultBundlePath IPadResults
          CODE_SIGNING_ALLOWED=NO
      - name: Extract screenshots
        if: always()
        run: |
          brew install chargepoint/xcparse/xcparse
          xcparse screenshots TestResults.xcresult shots || true
          xcparse screenshots IPadResults.xcresult shots/ipad || true
          xcparse attachments MacResults.xcresult shots --uti public.png || true
          ls -R shots || true
      - name: Publish screenshots
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -d shots ] && [ -n "$(ls -A shots 2>/dev/null)" ]; then
            cd shots
            git init -q -b ci-screenshots
            git config user.name "readr-ci" && git config user.email "ci@readr.local"
            git add -A && git commit -qm "screenshots for $GITHUB_SHA"
            git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" ci-screenshots
          fi
