name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  reader-kit:
    name: Build & test ReaderKit
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode_15.4.app
      - name: Build
        run: swift build
      - name: Test
        run: swift test
